{% extends 'base.html' %}

{% block extra_css %}
<style>
    textarea { font-family: monospace; }
    .codehilite pre { overflow-x: auto; }
    {{ code_css }}
</style>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col">
        <form>
            <fieldset disabled>
                <div class="form-group row">
                    <div class="col col-8">
                        {{ addform.name.label }}: {{ addform.name }}
                    </div>
                    <div class="col col-4">
                        {{ addform.user.label }}: {{ addform.user }}
                    </div>
                </div>
                <div class="form-group row">
                    <div class="col">
                        {{ addform.code.label }}:
                        {{ code_html|safe }}
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</div>

{% endblock %}
